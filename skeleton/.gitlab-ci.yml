# ─────────────────────────────────────────────────────────────────────────────
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#
#   GCP_AR_PROJECT_ID         – GCP project that hosts the Artifact Registry
#   GCP_AR_REPOSITORY         – Artifact Registry repository name (generic format)
#   GCP_AR_SERVICE_ACCOUNT_KEY – Base64-encoded JSON service-account key with
#                               roles/artifactregistry.writer on the repository
#
# Optional overrides (defaults shown below):
#   GCP_AR_REGION              – GCP region of the Artifact Registry (default: europe-west8)
#   PYTHON_VERSION            – Python image tag used in build stage (default: 3.11)
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - test
  - build
  - publish

variables:
  GCP_AR_REGION: "europe-west8"
  PYTHON_VERSION: "3.11"
  GCP_AR_PACKAGE: "${{ values.identifier | replace('.', '_') }}"

default:
  image: python:${PYTHON_VERSION}-slim

test:
  stage: test
  # Uses the default python:${PYTHON_VERSION}-slim image.
  # pyspark==3.5.3 is installed here to match the Dataproc cluster version;
  # keep it aligned with the version declared in pyproject.toml.
  before_script:
    - pip install pytest pytest-cov pyspark==3.5.3
  script:
    - PYTHONPATH=artifacts/src pytest artifacts/tests/
        --tb=short
        --junitxml=test-report.xml
        --cov=artifacts/src/
        --cov-report=xml:coverage.xml
        --cov-report=term-missing
  coverage: '/(?i)TOTAL.*?\s+(\d+\%)/'
  artifacts:
    when: always
    reports:
      junit: test-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build:
  stage: build
  before_script:
    - pip install build
  script:
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        VERSION="${CI_COMMIT_TAG#v}"  # strip leading 'v' so wheel and registry version match (e.g. v1.2.3 → 1.2.3)
        WHEEL_VERSION="${VERSION}"
      elif [ "${CI_COMMIT_BRANCH}" = "${CI_DEFAULT_BRANCH}" ]; then
        VERSION="current"
        WHEEL_VERSION="0.0.0+current"  # PEP 440 local version identifier
      else
        VERSION="testing"
        WHEEL_VERSION="0.0.0+testing"  # PEP 440 local version identifier
      fi

      echo "VERSION=${VERSION}" >> build.env

      # Fail fast if the version line is not where expected, rather than
      # silently building a wheel stamped with the placeholder version.
      grep -q '^version = ' artifacts/pyproject.toml \
        || { echo "ERROR: 'version = ' line not found in artifacts/pyproject.toml"; exit 1; }
      sed -i "s/^version = .*/version = \"${WHEEL_VERSION}\"/" artifacts/pyproject.toml
      python -m build --wheel artifacts/ --outdir artifacts/dist/
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}-wheel"
    paths:
      - artifacts/dist/*.whl
    reports:
      dotenv: build.env
    expire_in: 1 week

publish:
  stage: publish
  image: google/cloud-sdk:slim
  needs:
    - job: test
    - job: build
      artifacts: true
  before_script:
    - echo "${GCP_AR_SERVICE_ACCOUNT_KEY}" | base64 -d > /tmp/sa_key.json
    - gcloud auth activate-service-account --key-file=/tmp/sa_key.json
    - gcloud config set project "${GCP_AR_PROJECT_ID}"
  script:
    - |
      if [ "${VERSION}" = "current" ] || [ "${VERSION}" = "testing" ]; then
        gcloud artifacts versions delete "${VERSION}" \
          --location="${GCP_AR_REGION}" \
          --repository="${GCP_AR_REPOSITORY}" \
          --package="${GCP_AR_PACKAGE}" \
          --quiet 2>/dev/null || true
      fi
      WHL_ORIG=$(ls artifacts/dist/*.whl | head -1)
      # GCP Artifact Registry rejects '+' in filenames (used by PEP 440 local
      # version identifiers like 0.0.0+current); rename before uploading.
      WHL="${WHL_ORIG//+/-}"
      [ "$WHL_ORIG" != "$WHL" ] && mv "$WHL_ORIG" "$WHL"
      gcloud artifacts generic upload \
        --location="${GCP_AR_REGION}" \
        --repository="${GCP_AR_REPOSITORY}" \
        --package="${GCP_AR_PACKAGE}" \
        --version="${VERSION}" \
        --source="${WHL}"
  after_script:
    - rm -f /tmp/sa_key.json
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH != null'
